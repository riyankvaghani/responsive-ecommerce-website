<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEase</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Simple Header -->
    <!-- <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-shopping-bag me-2" style="color: #ff9900;"></i>
                <span style="color: #ff9900;">Shop</span>Ease
            </a>
        </div>
    </nav> -->

    <!-- Login Form -->
    <div class="auth-card">
        <h3>Welcome Back!</h3>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            
            <button type="submit" class="btn-auth">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
            
            <div class="auth-footer">
                <p class="mb-2">Don't have an account? <a href="register.html" class="text-decoration-none" style="color: #ff9900;">Register</a></p>
                <a href="#" class="text-decoration-none small">Forgot your password?</a>
            </div>
        </form>
        
        <!-- Social Login -->
        <div class="text-center mt-4">
            <p class="text-muted mb-3">Or login with</p>
            <div class="d-flex justify-content-center gap-2">
                <button class="btn btn-outline-secondary">
                    <i class="fab fa-google"></i>
                </button>
                <button class="btn btn-outline-secondary">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button class="btn btn-outline-secondary">
                    <i class="fab fa-apple"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
